<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Menú · Birriería Cocula</title>
<meta name="description" content="Menú completo de Birriería Cocula · Platillos, bebidas y paquetes" />
<meta name="theme-color" content="#24262F" />
<link rel="icon" type="image/png" href="assets/images/brand/logo.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;700&family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css" />
<style>
.menu-page {
  min-height: 100vh;
  background: var(--cream-soft);
}

.menu-page__header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  padding: 14px var(--pad);
  background: color-mix(in srgb, var(--char) 92%, transparent);
  color: var(--cream-soft);
  backdrop-filter: saturate(140%) blur(8px);
}

.menu-page__brand {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: inherit;
}

.menu-page__brand img {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--cream-soft);
}

.menu-page__brand span {
  font-family: var(--f-display);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.menu-page__back {
  font-family: var(--f-display);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  padding: 12px 22px;
  background: var(--orange);
  color: #fff;
  border-radius: 2px;
  transition: background 0.25s ease;
}

.menu-page__back:hover {
  background: var(--orange-deep);
}

.menu-page__container {
  padding-top: 80px;
  max-width: 1240px;
  margin: 0 auto;
}

.menu-page__section {
  padding: clamp(40px, 6vw, 80px) var(--pad);
}

.menu-page__title {
  font-family: var(--f-display);
  font-weight: 700;
  font-size: clamp(28px, 5vw, 48px);
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: var(--char);
  margin: 0 0 32px;
  text-align: center;
}

.menu-page__title em {
  font-family: var(--f-accent);
  font-style: italic;
  font-weight: 400;
  color: var(--orange);
  text-transform: none;
  display: block;
  font-size: 0.9em;
  margin-top: 8px;
}

.menu-page__image {
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
  display: block;
  border-radius: 4px;
  box-shadow: 0 10px 40px rgba(36, 38, 47, 0.15);
}

@media (max-width: 768px) {
  .menu-page__header {
    flex-direction: column;
    gap: 12px;
  }

  .menu-page__back {
    width: 100%;
    text-align: center;
  }
}
</style>
</head>
<body>

<!-- ─── HEADER ──────────────────────────────────────────── -->
<header class="menu-page__header">
  <a href="index.html" class="menu-page__brand" aria-label="Volver al inicio">
    <img src="assets/images/brand/logo.png" alt="" />
    <span>Cocula</span>
  </a>
  <a href="index.html" class="menu-page__back">← Volver</a>
</header>

<!-- ─── MENÚ PAGE ────────────────────────────────────────── -->
<main class="menu-page">
  <div class="menu-page__container">

    <!-- Paquetes -->
    <section class="menu-page__section">
      <h1 class="menu-page__title">Paquetes</h1>
      <img src="assets/images/menu-pages/paquetes.png" alt="Menú de paquetes" class="menu-page__image" />
    </section>

    <!-- Bebidas -->
    <section class="menu-page__section">
      <h2 class="menu-page__title">Bebidas</h2>
      <img src="assets/images/menu-pages/bebidas.png" alt="Menú de bebidas" class="menu-page__image" />
    </section>

    <!-- Platillos -->
    <section class="menu-page__section">
      <h2 class="menu-page__title">Platillos</h2>
      <img src="assets/images/menu-pages/platillos.png" alt="Menú de platillos" class="menu-page__image" />
    </section>

  </div>
</main>

</body>
</html>
